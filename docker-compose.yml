services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifebook
      POSTGRES_PASSWORD: lifebook
      POSTGRES_DB: lifebook
    ports:
      - "5432:5432"
    volumes:
      - lifebook-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifebook -d lifebook"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - lifebook-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  lifebook-postgres:
  lifebook-redis:

